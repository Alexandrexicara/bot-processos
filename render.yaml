services:
  # Serviço web + Telegram bot 24h
  - type: web
    name: processo-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: starter  # $7/mês — sempre online 24h
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: processo-db
          property: connectionString
      - key: ESCAVADOR_API_KEY
        sync: false       # preenche manualmente no painel Render
      - key: JUSBRASIL_API_KEY
        sync: false
      - key: DATAAJUD_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # Banco PostgreSQL gerenciado
databases:
  - name: processo-db
    plan: free            # 1GB grátis — suficiente para começar
